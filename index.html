<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#05080f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <title>Tune3D</title>
  </head>
  <body>
    <div class="ambient-bg" aria-hidden="true">
      <div class="ambient-orb ambient-orb--cyan"></div>
      <div class="ambient-orb ambient-orb--violet"></div>
      <div class="ambient-vignette"></div>
    </div>

    <button
      id="menuToggle"
      class="glow-button"
      type="button"
      aria-label="Open instruments menu"
      aria-expanded="false"
      aria-controls="instrumentDrawer"
    >
      <span class="bar"></span>
      <span class="bar"></span>
      <span class="bar"></span>
    </button>

    <div id="menuBackdrop" aria-hidden="true"></div>

    <aside id="instrumentDrawer" aria-hidden="true" aria-label="Instruments">
      <div class="drawer-header">
        <h2>Instrument</h2>
        <button id="menuClose" type="button" aria-label="Close menu">×</button>
      </div>
      <div id="instrumentList"></div>
      <div id="drawerStrings" hidden>
        <div class="drawer-section-label">Strings · tap to lock</div>
        <div id="stringList"></div>
      </div>
      <p class="drawer-footer">Tap a string chip to lock tuning to that note.</p>
    </aside>

    <div id="app">
      <header id="appHeader">
        <div id="instrumentLabel">CHROMATIC</div>
      </header>

      <section id="readout" class="glass-card status-card" aria-live="polite">
        <div id="noteBar" class="note-bar idle" role="presentation"></div>
        <div id="note">—</div>
        <div id="freq">Hz</div>
        <div class="readout-divider" role="presentation"></div>
        <div id="direction" class="direction idle">Play a note</div>
        <div id="status">Waiting for input</div>
        <div id="cents" aria-hidden="true">—</div>
      </section>

      <div id="canvas-wrap">
        <canvas id="renderCanvas"></canvas>
      </div>
    </div>

    <footer id="hintBar" class="hint-bar glass-pill">
      <div class="hint-bar__section">
        <svg class="hint-bar__icon" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <circle cx="8" cy="8" r="6.5" stroke="currentColor" stroke-width="1.2" />
          <path d="M8 7v4M8 5.5v.01" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" />
        </svg>
        <span>Open the menu to pick an instrument</span>
      </div>
      <div class="hint-bar__divider" aria-hidden="true"></div>
      <div class="hint-bar__section">
        <span>Tap a string to lock it</span>
      </div>
    </footer>

    <div id="overlay">
      <h1>Tune3D</h1>
      <p>
        A glowing target tracks your pitch — the ball pulls to center when you're in tune.
      </p>
      <button id="startBtn" type="button">Start listening</button>
      <p id="overlayError"></p>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
