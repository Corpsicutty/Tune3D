<!doctype html>

<html lang="en">

  <head>

    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <meta name="theme-color" content="#050a14" />

    <meta name="apple-mobile-web-app-capable" content="yes" />

    <title>Tuner · Box3D</title>

    <style>

      * {

        box-sizing: border-box;

        margin: 0;

        padding: 0;

      }



      html,

      body {

        width: 100%;

        height: 100%;

        overflow: hidden;

        background: #050a14;

        color: #e8ecf4;

        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;

        -webkit-font-smoothing: antialiased;

      }



      #app {

        display: flex;

        flex-direction: column;

        height: 100%;

        height: 100dvh;

      }



      #appHeader {

        flex: 0 0 auto;

        padding: max(52px, calc(44px + env(safe-area-inset-top))) 20px 8px;

        padding-left: max(56px, calc(44px + env(safe-area-inset-left)));

        text-align: center;

        z-index: 2;

      }



      #instrumentLabel {

        font-size: 0.78rem;

        font-weight: 500;

        letter-spacing: 0.14em;

        text-transform: uppercase;

        color: #58d4ff;

        text-shadow: 0 0 12px rgba(88, 212, 255, 0.45);

      }



      #readout {

        flex: 0 0 auto;

        margin: 0 16px 10px;

        padding: 14px 18px 12px;

        text-align: center;

        background: rgba(8, 14, 26, 0.85);

        border: 1px solid rgba(60, 120, 180, 0.22);

        border-radius: 16px;

        box-shadow:

          0 0 24px rgba(20, 80, 140, 0.12),

          inset 0 1px 0 rgba(255, 255, 255, 0.04);

        z-index: 2;

      }



      .note-bar {

        height: 5px;

        width: 18%;

        margin: 0 auto 10px;

        border-radius: 999px;

        background: linear-gradient(90deg, rgba(88, 212, 255, 0.3), rgba(255, 255, 255, 0.95), rgba(88, 212, 255, 0.3));

        box-shadow: 0 0 14px rgba(255, 255, 255, 0.55);

        transition: width 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;

      }



      .note-bar.idle {

        background: rgba(255, 255, 255, 0.85);

        box-shadow: 0 0 10px rgba(255, 255, 255, 0.35);

      }



      .note-bar.in-tune {

        background: linear-gradient(90deg, rgba(61, 232, 138, 0.4), #3de88a, rgba(61, 232, 138, 0.4));

        box-shadow: 0 0 16px rgba(61, 232, 138, 0.65);

      }



      .note-bar.sharp {

        background: linear-gradient(90deg, rgba(255, 179, 71, 0.4), #ffb347, rgba(255, 179, 71, 0.4));

        box-shadow: 0 0 16px rgba(255, 179, 71, 0.55);

      }



      .note-bar.flat {

        background: linear-gradient(90deg, rgba(255, 200, 80, 0.4), #ffc850, rgba(255, 200, 80, 0.4));

        box-shadow: 0 0 16px rgba(255, 200, 80, 0.55);

      }



      #note {

        position: absolute;

        width: 1px;

        height: 1px;

        overflow: hidden;

        clip: rect(0 0 0 0);

      }



      #freq {

        font-size: 0.72rem;

        font-weight: 500;

        letter-spacing: 0.12em;

        text-transform: uppercase;

        color: #58d4ff;

        font-variant-numeric: tabular-nums;

      }



      .readout-divider {

        height: 1px;

        margin: 8px auto 10px;

        width: 72%;

        background: linear-gradient(90deg, transparent, rgba(88, 212, 255, 0.55), transparent);

        box-shadow: 0 0 8px rgba(88, 212, 255, 0.35);

      }



      #cents {

        display: none;

      }



      .direction {

        font-size: 1.05rem;

        font-weight: 500;

        color: #f0f4ff;

        text-shadow: 0 0 10px rgba(240, 244, 255, 0.15);

      }



      .direction.idle {

        color: #d8e4f4;

      }



      .direction.in-tune {

        color: #3de88a;

        text-shadow: 0 0 14px rgba(61, 232, 138, 0.45);

      }



      .direction.sharp {

        color: #ffb347;

        text-shadow: 0 0 14px rgba(255, 179, 71, 0.4);

      }



      .direction.flat {

        color: #ffc850;

        text-shadow: 0 0 14px rgba(255, 200, 80, 0.4);

      }



      #status {

        margin-top: 6px;

        font-size: 0.68rem;

        color: #4a6080;

        text-transform: uppercase;

        letter-spacing: 0.12em;

      }



      #stringList {

        display: flex;

        flex-wrap: wrap;

        gap: 8px;

      }



      .string-chip {

        border: 1px solid rgba(88, 160, 255, 0.28);

        background: rgba(12, 20, 36, 0.8);

        color: #b8c2d6;

        border-radius: 8px;

        padding: 5px 10px;

        font-size: 0.78rem;

        font-weight: 600;

        font-variant-numeric: tabular-nums;

        cursor: pointer;

      }



      .string-chip.hearing {

        border-color: rgba(88, 212, 255, 0.7);

        color: #9fe6ff;

        box-shadow: 0 0 12px rgba(88, 212, 255, 0.25);

      }



      .string-chip.pinned {

        background: rgba(58, 158, 255, 0.22);

        border-color: rgba(90, 170, 255, 0.7);

        color: #d8ecff;

        box-shadow: 0 0 12px rgba(88, 160, 255, 0.2);

      }



      #canvas-wrap {

        flex: 1 1 auto;

        position: relative;

        min-height: 0;

        background: radial-gradient(ellipse at 50% 42%, rgba(20, 60, 110, 0.18) 0%, transparent 65%);

      }



      #renderCanvas {

        width: 100%;

        height: 100%;

        touch-action: none;

        display: block;

      }



      #menuToggle {

        position: fixed;

        top: max(10px, env(safe-area-inset-top));

        left: max(10px, env(safe-area-inset-left));

        z-index: 8;

        width: 44px;

        height: 44px;

        border: 1px solid rgba(88, 160, 255, 0.35);

        border-radius: 12px;

        background: rgba(8, 14, 26, 0.92);

        color: #58d4ff;

        cursor: pointer;

        display: flex;

        flex-direction: column;

        align-items: center;

        justify-content: center;

        gap: 5px;

        padding: 0;

        backdrop-filter: blur(8px);

        box-shadow: 0 0 16px rgba(88, 160, 255, 0.15);

        transition: background 0.2s, border-color 0.2s, box-shadow 0.2s;

      }



      #menuToggle:hover {

        border-color: rgba(88, 212, 255, 0.55);

        box-shadow: 0 0 20px rgba(88, 212, 255, 0.25);

      }



      #menuToggle .bar {

        display: block;

        width: 18px;

        height: 2px;

        background: currentColor;

        border-radius: 1px;

        box-shadow: 0 0 6px rgba(88, 212, 255, 0.4);

        transition: transform 0.25s, opacity 0.2s;

      }



      #menuToggle.open .bar:nth-child(1) {

        transform: translateY(7px) rotate(45deg);

      }



      #menuToggle.open .bar:nth-child(2) {

        opacity: 0;

      }



      #menuToggle.open .bar:nth-child(3) {

        transform: translateY(-7px) rotate(-45deg);

      }



      #menuBackdrop {

        position: fixed;

        inset: 0;

        z-index: 11;

        background: rgba(4, 8, 16, 0.65);

        backdrop-filter: blur(4px);

        opacity: 0;

        pointer-events: none;

        transition: opacity 0.25s;

      }



      #menuBackdrop.open {

        opacity: 1;

        pointer-events: auto;

      }



      #instrumentDrawer {

        position: fixed;

        top: 0;

        left: 0;

        bottom: 0;

        z-index: 12;

        width: min(320px, 88vw);

        padding: max(12px, env(safe-area-inset-top)) 16px max(16px, env(safe-area-inset-bottom));

        padding-left: max(16px, env(safe-area-inset-left));

        background: rgba(6, 10, 20, 0.98);

        border-right: 1px solid rgba(88, 160, 255, 0.18);

        box-shadow: 8px 0 40px rgba(0, 0, 0, 0.55);

        display: flex;

        flex-direction: column;

        gap: 12px;

        transform: translateX(-105%);

        transition: transform 0.28s cubic-bezier(0.4, 0, 0.2, 1);

        overflow: hidden;

      }



      #instrumentDrawer.open {

        transform: translateX(0);

      }



      .drawer-header {

        display: flex;

        align-items: center;

        justify-content: space-between;

        flex-shrink: 0;

        padding-top: 4px;

      }



      .drawer-header h2 {

        font-size: 1.05rem;

        font-weight: 600;

        color: #e8ecf4;

      }



      #menuClose {

        width: 36px;

        height: 36px;

        border: none;

        border-radius: 10px;

        background: rgba(255, 255, 255, 0.06);

        color: #9aa8c0;

        font-size: 1.4rem;

        line-height: 1;

        cursor: pointer;

      }



      #instrumentList {

        flex: 1 1 auto;

        overflow-y: auto;

        display: flex;

        flex-direction: column;

        gap: 4px;

      }



      .instrument-item {

        display: flex;

        align-items: center;

        gap: 12px;

        width: 100%;

        border: 1px solid transparent;

        border-radius: 12px;

        background: transparent;

        color: #b8c2d6;

        padding: 10px 12px;

        cursor: pointer;

        text-align: left;

      }



      .instrument-item.active {

        background: rgba(40, 80, 140, 0.35);

        border-color: rgba(88, 160, 255, 0.45);

        color: #e8f2ff;

        box-shadow: 0 0 16px rgba(88, 160, 255, 0.12);

      }



      .instrument-item-icon svg {

        width: 24px;

        height: 24px;

      }



      .instrument-item-text {

        display: flex;

        flex-direction: column;

        gap: 2px;

      }



      .instrument-item-name {

        font-size: 0.92rem;

        font-weight: 600;

      }



      .instrument-item-sub {

        font-size: 0.72rem;

        color: #6a7a96;

      }



      #drawerStrings {

        flex-shrink: 0;

        border-top: 1px solid rgba(88, 160, 255, 0.12);

        padding-top: 12px;

      }



      #drawerStrings[hidden] {

        display: none;

      }



      .drawer-section-label {

        font-size: 0.7rem;

        font-weight: 600;

        letter-spacing: 0.08em;

        text-transform: uppercase;

        color: #6a7a96;

        margin-bottom: 8px;

      }



      .instrument-category {

        font-size: 0.65rem;

        font-weight: 600;

        letter-spacing: 0.1em;

        text-transform: uppercase;

        color: #4a6080;

        padding: 10px 12px 4px;

        flex-shrink: 0;

      }



      .instrument-category:first-child {

        padding-top: 0;

      }



      .drawer-footer {

        flex-shrink: 0;

        font-size: 0.65rem;

        color: #4a6080;

        line-height: 1.45;

        padding-top: 8px;

        border-top: 1px solid rgba(88, 160, 255, 0.1);

      }



      #overlay {

        position: fixed;

        inset: 0;

        display: flex;

        flex-direction: column;

        align-items: center;

        justify-content: center;

        gap: 16px;

        padding: 24px;

        background: rgba(4, 8, 16, 0.92);

        backdrop-filter: blur(12px);

        z-index: 20;

        text-align: center;

      }



      #overlay.hidden {

        display: none;

      }



      #overlay h1 {

        font-size: 1.5rem;

        font-weight: 600;

        color: #e8ecf4;

        text-shadow: 0 0 20px rgba(88, 212, 255, 0.25);

      }



      #overlay p {

        max-width: 280px;

        font-size: 0.9rem;

        line-height: 1.5;

        color: #8a94a8;

      }



      #startBtn {

        margin-top: 8px;

        padding: 14px 32px;

        border: none;

        border-radius: 999px;

        background: linear-gradient(135deg, #2a8eff, #4b6dff);

        color: #fff;

        font-size: 1rem;

        font-weight: 600;

        cursor: pointer;

        box-shadow: 0 8px 32px rgba(58, 158, 255, 0.4);

      }



      #startBtn[disabled] {

        opacity: 0.6;

        cursor: wait;

      }



    </style>

  </head>

  <body>

    <button id="menuToggle" type="button" aria-label="Open instruments menu" aria-expanded="false" aria-controls="instrumentDrawer">

      <span class="bar"></span>

      <span class="bar"></span>

      <span class="bar"></span>

    </button>



    <div id="menuBackdrop" aria-hidden="true"></div>



    <aside id="instrumentDrawer" aria-hidden="true" aria-label="Instruments">

      <div class="drawer-header">

        <h2>Instrument</h2>

        <button id="menuClose" type="button" aria-label="Close menu">×</button>

      </div>

      <div id="instrumentList"></div>

      <div id="drawerStrings" hidden>

        <div class="drawer-section-label">Strings · tap to lock</div>

        <div id="stringList"></div>

      </div>

      <p class="drawer-footer">Tap a string chip to lock tuning to that note.</p>

    </aside>



    <div id="app">

      <header id="appHeader">

        <div id="instrumentLabel">CHROMATIC</div>

      </header>

      <div id="readout">

        <div id="noteBar" class="note-bar idle" role="presentation"></div>

        <div id="note" aria-live="polite">—</div>

        <div id="freq">Hz</div>

        <div class="readout-divider" role="presentation"></div>

        <div id="direction" class="direction idle">Tap start to tune</div>

        <div id="status">Ready</div>

        <div id="cents" aria-hidden="true">—</div>

      </div>

      <div id="canvas-wrap">

        <canvas id="renderCanvas"></canvas>

      </div>

    </div>



    <div id="overlay">

      <h1>Box3D Tuner</h1>

      <p>

        A glowing target tracks your pitch — the ball pulls to center when you're in tune.

      </p>

      <button id="startBtn" type="button">Start listening</button>

      <p id="overlayError" style="color: #ff7b9c; min-height: 1.2em"></p>

    </div>



    <script type="module" src="/src/main.ts"></script>

  </body>

</html>
